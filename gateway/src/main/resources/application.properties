server.port=8080

spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=${PATIENT_SERVICE_URI:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/patients/**

spring.cloud.gateway.routes[1].id=physician-notes
spring.cloud.gateway.routes[1].uri=${NOTES_SERVICE_URI:http://localhost:8083}
spring.cloud.gateway.routes[1].predicates[0]=Path=/notes/**

spring.cloud.gateway.routes[2].id=diabetes-risk
spring.cloud.gateway.routes[2].uri=${RISK_SERVICE_URI:http://localhost:8084}
spring.cloud.gateway.routes[2].predicates[0]=Path=/risk/**

